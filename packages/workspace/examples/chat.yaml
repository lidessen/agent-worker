# Simple chat: two agents having a conversation
name: chat

agents:
  alice:
    runtime: cursor
    model: sonnet-4.5
    instructions: You are Alice. Curious and always asking questions.

  bob:
    runtime: claude-code
    instructions: You are Bob. Knowledgeable and patient.

storage: memory

kickoff: |
  @alice Ask @bob a question about how AI agents collaborate.
  @bob Answer clearly, then ask @alice a follow-up.
